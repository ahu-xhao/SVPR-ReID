MODEL:
  DEVICE_ID: ('1')
  PRETRAIN_PATH: '../pretrain_model/CLIP-ViT-B-16.pt'
  NAME: 'ViT-B-16'
  ARCH_NAME: 'CLIP_SVPR_ReID'
  # ARCH_NAME: 'CLIP_baseline'
  STRIDE_SIZE: [16, 16]
  ID_LOSS_WEIGHT : 0.25
  # xhao
  USE_TEXT: True
  TEXT_TYPE: 'attribute'                       # Type of text input (options: 'captions', 'attribute')
  TEXT_FORMAT: 'depart'                        # Format of text input (options: 'hybird', 'depart')
  FREEZE_TEXT: True
  TEXT_PROMPT: 4                               # Num of text prompt ("X ")
  TEXT_LEN: 100                                # context length of text for clip tokenlizer
  HEAD_UNIFORM: False                           # Whether to use a uniform contact features loss supervision
  USE_ATTR: True
  VIEW_PROMPT: 4

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATALOADER:
  SAMPLER: 'softmax_triplet'
  SAMPLER_NAME: 'RandomIdentitySampler'
  AUG: False
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  STAGE1:
    TRAIN: False
    PRETRAIN_PATH: ''
  
  IMS_PER_BATCH: 128
  OPTIMIZER_NAME: "Adam"
  BASE_LR: 5e-6
  WARMUP_METHOD: 'linear'
  WARMUP_ITERS: 10
  WARMUP_FACTOR: 0.1
  LR_MIN: 1.6e-6
  MAX_EPOCHS: 120
  CHECKPOINT_PERIOD: 121
  LOG_PERIOD: 5
  EVAL_PERIOD: 2
  
  STEPS: [30, 50]

DATASETS:
  ROOT_DIR: ('../datasets/')
  NAMES: ("CP2108_ALL")
  TESTS: ("CP2108_ALL", "CP2108_AG","CP2108_GA", "CP2108_AGAG")
  VERSION: 100

TEST:
  IMS_PER_BATCH: 256
  RE_RANKING: False
  WEIGHT: 'outputs/cp2108_svpr_reid/transformer_best.pth'
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'
  TIME_MODE: 'mix'
  
OUTPUT_DIR: 'outputs/cp2108_svpr_reid'

# CUDA_VISIBLE_DEVICES=2 python train_clipreid_xhao.py --config_file configs/CP2108/vit_clipreid_SVPR_ReID.yml
# CUDA_VISIBLE_DEVICES=0 python test_clipreid_xhao.py --config_file configs/CP2108/vit_clipreid_SVPR_ReID.yml