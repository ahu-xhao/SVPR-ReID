MODEL:
  DEVICE_ID: ('1')
  PRETRAIN_PATH: '../pretrain_model/jx_vit_base_p16_224-80ecf9dd.pth'
  NAME: 'vit_base_patch16_224_TransReID'
  ARCH_NAME: 'TransReID'
  STRIDE_SIZE: [16, 16]
  # xhao
  FREEZE_TEXT: True
  USE_TEXT: False
  TEXT_PROMPT: 2                               # Num of text prompt ("X ")
  TEXT_LEN: 77                                 # context length of text for clip tokenlizer
  HEAD_UNIFORM: False                           # Whether to use a uniform contact features loss supervision

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATALOADER:
  SAMPLER: 'softmax_triplet'
  SAMPLER_NAME: 'RandomIdentitySampler'
  AUG: False
  NUM_INSTANCE: 8
  NUM_WORKERS: 8

SOLVER:
  STAGE1:
    TRAIN: FALSE
    PRETRAIN_PATH: 'False'

  IMS_PER_BATCH: 128
  OPTIMIZER_NAME: "SGD"
  BASE_LR: 0.008
  WARMUP_ITERS: 10

  MAX_EPOCHS: 120
  CHECKPOINT_PERIOD: 121
  LOG_PERIOD: 5
  EVAL_PERIOD: 2
  

DATASETS:
  ROOT_DIR: ('../datasets/')
  NAMES: ("CP2108_ALL")
  TESTS: ("CP2108_ALL", "CP2108_AG","CP2108_GA", "CP2108_AGAG")
  VERSION: 100

TEST:
  IMS_PER_BATCH: 256
  RE_RANKING: False
  WEIGHT: 'outputs/cp2108_TransReID/transformer_best.pth'
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'
  TIME_MODE: 'mix'

OUTPUT_DIR: 'outputs/cp2108_TransReID/crosstime'

# CUDA_VISIBLE_DEVICES=4 python train_clipreid_xhao.py --config_file configs/CP2108/vit_transreid.yml
# CUDA_VISIBLE_DEVICES=4 python test_clipreid_xhao.py --config_file configs/CP2108/vit_transreid.yml
