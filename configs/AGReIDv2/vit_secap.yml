MODEL:
  DEVICE_ID: ('1')
  PRETRAIN_PATH: '../pretrain_model/jx_vit_base_p16_224-80ecf9dd.pth'
  NAME: 'vit_base_patch16_224_VDT'
  ARCH_NAME: 'SeCap'
  STRIDE_SIZE: [16, 16]
  # xhao
  HEAD_UNIFORM: False                           # Whether to use a uniform contact features loss supervision

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATALOADER:
  SAMPLER: 'softmax_triplet'
  SAMPLER_NAME: 'RandomIdentitySampler'
  AUG: False
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  STAGE1:
    TRAIN: FALSE
    # PRETRAIN_PATH: 'outputs/AGReIDv2_CLIPReID_2stage/ViT-B-16_stage1_120.pth'

  IMS_PER_BATCH: 128
  OPTIMIZER_NAME: "SGD"
  BASE_LR: 0.008
  WARMUP_ITERS: 10

  MAX_EPOCHS: 120
  CHECKPOINT_PERIOD: 121
  LOG_PERIOD: 5
  EVAL_PERIOD: 2
  

DATASETS:
  ROOT_DIR: ('../datasets/')
  NAMES: ("AGReIDv2")
  TESTS: ("AGReIDv2", "AGReIDv2_AC","AGReIDv2_CA","AGReIDv2_AW", "AGReIDv2_WA")

TEST:
  IMS_PER_BATCH: 256
  RE_RANKING: False
  WEIGHT: 'outputs/AGReIDv2_secap/transformer_best.pth'
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'
  TIME_MODE: 'mix'

OUTPUT_DIR: 'outputs/AGReIDv2_secap'

# CUDA_VISIBLE_DEVICES=0 python train_clipreid_xhao.py --config_file configs/AGReIDv2/vit_secap.yml
